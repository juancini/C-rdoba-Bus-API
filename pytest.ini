[pytest]
# Pytest configuration for Córdoba Bus API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra summary info for all test outcomes
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
